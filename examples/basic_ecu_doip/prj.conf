# =============================================================================
# Xaloqi EDS
# examples/basic_ecu_doip/prj.conf
#
# Base project configuration for the DoIP example ECU.
# Board-specific overrides in boards/native_sim/native_sim_doip.conf.
# =============================================================================

# --- Kernel / threading ---
CONFIG_MULTITHREADING=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# --- Tick rate ---
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_TICKLESS_KERNEL=n

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# --- Safety hardening ---
CONFIG_ASSERT=y

# --- C library ---
CONFIG_NEWLIB_LIBC=y

# --- No heap (MISRA-21.3) ---
CONFIG_HEAP_MEM_POOL_SIZE=0

# --- UDS stack parameters ---
CONFIG_UDS_SESSION_S3_TIMEOUT_MS=5000
CONFIG_ISOTP_TIMEOUT_CR_MS=150
CONFIG_ISOTP_TIMEOUT_BS_MS=75
CONFIG_ISOTP_TIMEOUT_AS_MS=25

# --- DoIP thread ---
CONFIG_DOIP_STACK_SIZE=4096
CONFIG_DOIP_THREAD_PRIORITY=7

# --- Networking (base — board conf enables IPv4/TCP) ---
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_IF_MAX_IPV4_COUNT=1
CONFIG_NET_MAX_CONN=8
CONFIG_NET_TCP_MAX_SEND_WINDOW_SIZE=4096
CONFIG_POSIX_MAX_FDS=16

# --- Build output ---
CONFIG_BUILD_OUTPUT_BIN=y
