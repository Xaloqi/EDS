# =============================================================================
# Xaloqi EDS
# zephyr/module.yml
#
# Zephyr module descriptor — two purposes:
#
#   1. BUILD INTEGRATION (current):
#      Registers this repo as a Zephyr module so `west build` can locate
#      Kconfig symbols, include paths, and source files automatically.
#
#      With this file in place and the repo in west.yml, build with:
#        west build -b native_sim  examples/basic_ecu
#        west build -b nucleo_h743zi2 examples/basic_ecu
#
#   2. ECOSYSTEM SUBMISSION (E2 — when repo is public):
#      This file also satisfies the Zephyr module registry requirements.
#      To submit EDS to the Zephyr ecosystem page, open a PR to:
#        https://github.com/zephyrproject-rtos/zephyr
#      adding the following entry to zephyr/west.yml under `projects:`:
#
#        - name: embedded-diagnostics-suite
#          url: https://github.com/Xaloqi/EDS
#          revision: v1.3.0
#          path: modules/eds
#
#      The Zephyr project team reviews module PRs against the checklist at:
#        https://docs.zephyrproject.org/latest/contribute/modules.html
#
# REFERENCE: https://docs.zephyrproject.org/latest/develop/modules.html
#
# ─────────────────────────────────────────────────────────────────────────────
# Maintainer:  Raul Latorre Fortes <contact@xaloqi.com>
# Homepage:    https://github.com/Xaloqi/EDS
# =============================================================================

name: embedded-diagnostics-suite

# ---------------------------------------------------------------------------
# Build integration
#
# FIX (CI 2026-03-30 — multiple definition linker failure):
#   Removed "cmake: ." entry.
#
#   Root cause: when cmake: . is set, Zephyr calls add_subdirectory() on the
#   repo root during every west build, including example builds
#   (examples/bms_ecu, examples/motor_controller_ecu, etc.).  The root
#   CMakeLists.txt is an APP-level file — it calls project(), find_package(),
#   and target_sources(app PRIVATE examples/basic_ecu/src/main.c ...).
#   When it runs as a Zephyr module sub-directory while an example is the
#   primary app, both sets of sources get linked into the same app target,
#   producing multiple-definition linker errors for main, did_handlers_register_all,
#   uds_generated_init, uds_generated_get_server, and routine_handlers_register_all.
#
#   The cmake: key is intended for modules that add library sources via
#   zephyr_library_sources() — not for APP CMakeLists files that use
#   target_sources(app ...).  Each example has its own self-contained
#   CMakeLists.txt that adds the correct sources; the module cmake shim
#   is not needed and actively harmful.
#
#   The kconfig: entry below remains — it correctly registers Kconfig symbols
#   (CONFIG_DIAG_*, CONFIG_ISOTP_*, CONFIG_UDS_*) so they are available in
#   every board's prj.conf without manual include paths.
# ---------------------------------------------------------------------------
build:
  # cmake: intentionally absent — see FIX note above.

  # Kconfig exposes ISO-TP timing and UDS session parameters as first-class
  # Zephyr config symbols — overridable from prj.conf without touching YAML.
  kconfig: Kconfig

